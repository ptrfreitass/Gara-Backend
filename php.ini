memory_limit = 512M
upload_max_filesize = 100M
post_max_size = 100M
max_execution_time = 300
max_input_time = 300
date.timezone = UTC

expose_php = Off
display_errors = Off
display_startup_errors = Off
log_errors = On
error_log = /var/www/storage/logs/php-error.log
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT
